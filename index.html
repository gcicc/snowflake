<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Snowflake">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Snowflake Grower</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
:root{--bg:#060818;--sand:#c4a882;--text:#e6ddd0;--text-dim:#7d7567;--ice:#a8d4e6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;overflow:hidden;}
canvas{display:block;flex:1;touch-action:none;}
.top{display:flex;align-items:center;justify-content:space-between;padding:calc(10px+env(safe-area-inset-top)) 14px 4px;flex-shrink:0;transition:opacity 0.5s;}
.top.hidden{opacity:0;pointer-events:none;}
.title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:3px;color:var(--ice);text-transform:uppercase;}
.bottom{padding:4px 14px calc(8px+env(safe-area-inset-bottom));flex-shrink:0;transition:opacity 0.5s;}
.bottom.hidden{opacity:0;pointer-events:none;}
.ctrl{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.ctrl-lbl{font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;width:60px;flex-shrink:0;}
.ctrl input{flex:1;accent-color:var(--ice);}
.ctrl .val{min-width:30px;text-align:right;font-size:11px;color:var(--ice);font-variant-numeric:tabular-nums;}
.btns{display:flex;justify-content:center;gap:8px;margin-top:4px;}
.btn{background:none;border:1px solid rgba(168,212,230,0.25);color:var(--ice);padding:5px 14px;border-radius:14px;font-family:'Cormorant Garamond',serif;font-size:12px;cursor:pointer;letter-spacing:1px;}
.btn:active{transform:scale(0.95);}
.presets{display:flex;gap:4px;justify-content:center;margin-bottom:4px;flex-wrap:wrap;}
.preset{background:none;border:1px solid rgba(168,212,230,0.12);color:var(--text-dim);padding:3px 7px;border-radius:8px;font-size:8px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;}
.preset.active{color:var(--ice);border-color:rgba(168,212,230,0.3);}
</style>
</head>
<body>
<div class="top" id="topBar"><span class="title">Snowflake</span></div>
<canvas id="c"></canvas>
<div class="bottom" id="bottomBar">
  <div class="presets" id="presets"></div>
  <div class="ctrl"><span class="ctrl-lbl">Branches</span><input type="range" id="branchSlider" min="4" max="12" value="6" step="2"><span class="val" id="branchVal">6</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Complexity</span><input type="range" id="complexSlider" min="1" max="5" value="3"><span class="val" id="complexVal">3</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Speed</span><input type="range" id="speedSlider" min="10" max="300" value="100"><span class="val" id="speedVal">1.0x</span></div>
  <div class="btns">
    <button class="btn" id="btnNew">New Crystal</button>
    <button class="btn" id="btnPause">Pause</button>
    <button class="btn" id="btnImmerse">Immerse</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr,cx,cy;
function resize(){dpr=window.devicePixelRatio||1;W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);cx=W/2;cy=H/2;}
window.addEventListener('resize',resize);resize();

let branches=6, complexity=3, speed=1, paused=false, immersed=false;
let crystalPoints=[];
let growStep=0;
let currentPreset='dendrite';

const PRESETS=[
  {name:'Dendrite',id:'dendrite',b:6,c:4},
  {name:'Plate',id:'plate',b:6,c:1},
  {name:'Star',id:'star',b:6,c:3},
  {name:'Fern',id:'fern',b:6,c:5},
  {name:'Hex',id:'hex',b:6,c:2},
  {name:'Eight',id:'eight',b:8,c:3},
  {name:'Twelve',id:'twelve',b:12,c:2},
];

function renderPresets(){
  const el=document.getElementById('presets');
  el.innerHTML='';
  PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='preset'+(p.id===currentPreset?' active':'');
    b.textContent=p.name;
    b.addEventListener('click',()=>{
      currentPreset=p.id;branches=p.b;complexity=p.c;
      document.getElementById('branchSlider').value=branches;
      document.getElementById('branchVal').textContent=branches;
      document.getElementById('complexSlider').value=complexity;
      document.getElementById('complexVal').textContent=complexity;
      newCrystal();renderPresets();
    });
    el.appendChild(b);
  });
}

function newCrystal(){
  crystalPoints=[];
  growStep=0;
  paused=false;
  document.getElementById('btnPause').textContent='Pause';
  ctx.fillStyle='#060818';
  ctx.fillRect(0,0,W,H);
}

// Generate crystal growth path using recursive branching
function generateBranch(startR,length,angle,depth,maxDepth){
  const points=[];
  const steps=20+Math.floor(Math.random()*15);
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const r=startR+length*t;
    const wobble=Math.sin(t*Math.PI*4)*1.5*(depth+1)*0.3;
    points.push({r,a:angle+wobble*0.01,t,depth});

    // Sub-branches
    if(depth<maxDepth && i>3 && i<steps-2 && Math.random()<0.15*complexity/3){
      const subLen=length*(0.2+Math.random()*0.3)*(1-t*0.5);
      const subAngle=angle+(Math.random()>0.5?1:-1)*(0.3+Math.random()*0.5);
      const sub=generateBranch(r,subLen,subAngle,depth+1,maxDepth);
      points.push(...sub);
    }
  }
  return points;
}

function generateCrystal(){
  crystalPoints=[];
  const maxR=Math.min(W,H)*0.4;
  const mainLen=maxR*0.85;

  for(let b=0;b<branches;b++){
    const angle=(Math.PI*2/branches)*b;
    const branchPts=generateBranch(5,mainLen,angle,0,complexity);
    crystalPoints.push(...branchPts);

    // Mirror sub-branches for symmetry within each arm
    branchPts.forEach(p=>{
      if(p.depth>0){
        crystalPoints.push({r:p.r,a:2*((Math.PI*2/branches)*b)-p.a,t:p.t,depth:p.depth});
      }
    });
  }
}

function drawCrystalStep(){
  if(paused || growStep>=crystalPoints.length) return;

  const batchSize=Math.max(1,Math.floor(speed*3));

  for(let s=0;s<batchSize && growStep<crystalPoints.length;s++){
    const p=crystalPoints[growStep];
    const x=cx+Math.cos(p.a)*p.r;
    const y=cy+Math.sin(p.a)*p.r;

    const alpha=0.3+0.5*(1-p.depth/(complexity+1));
    const size=1.5-p.depth*0.2;

    // Ice crystal glow
    ctx.fillStyle=`rgba(168,212,230,${alpha*0.15})`;
    ctx.beginPath();
    ctx.arc(x,y,size*4,0,Math.PI*2);
    ctx.fill();

    // Crystal point
    ctx.fillStyle=`rgba(200,230,245,${alpha})`;
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();

    // Bright center
    ctx.fillStyle=`rgba(230,245,255,${alpha*0.5})`;
    ctx.beginPath();
    ctx.arc(x,y,size*0.5,0,Math.PI*2);
    ctx.fill();

    growStep++;
  }
}

function tick(){
  drawCrystalStep();
  requestAnimationFrame(tick);
}

generateCrystal();
requestAnimationFrame(tick);

// Controls
document.getElementById('branchSlider').addEventListener('input',e=>{branches=parseInt(e.target.value);document.getElementById('branchVal').textContent=branches;newCrystal();generateCrystal();});
document.getElementById('complexSlider').addEventListener('input',e=>{complexity=parseInt(e.target.value);document.getElementById('complexVal').textContent=complexity;newCrystal();generateCrystal();});
document.getElementById('speedSlider').addEventListener('input',e=>{speed=parseInt(e.target.value)/100;document.getElementById('speedVal').textContent=speed.toFixed(1)+'x';});
document.getElementById('btnNew').addEventListener('click',()=>{newCrystal();generateCrystal();});
document.getElementById('btnPause').addEventListener('click',()=>{paused=!paused;document.getElementById('btnPause').textContent=paused?'Resume':'Pause';});

const topBar=document.getElementById('topBar'),bottomBar=document.getElementById('bottomBar');
document.getElementById('btnImmerse').addEventListener('click',()=>{immersed=true;topBar.classList.add('hidden');bottomBar.classList.add('hidden');});
canvas.addEventListener('touchstart',e=>{if(immersed){e.preventDefault();immersed=false;topBar.classList.remove('hidden');bottomBar.classList.remove('hidden');}},{passive:false});
canvas.addEventListener('click',()=>{if(immersed){immersed=false;topBar.classList.remove('hidden');bottomBar.classList.remove('hidden');}});

renderPresets();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
